<!Doctype html>
<html>
	<head>
		<title>Graph Isomorphism</title>
		<script type='module' src='js/main.js'></script>
		<link rel='stylesheet' href='css/main.css'>
	</head>
	<body>
		<h1>Graph Isomorphism</h1>
		<p>Create vertices and edges and drag them around to check for isomorphism</p>
		<div id='canvas-and-buttons'>
			<canvas id='canvas' width='800' height='600'></canvas>
			<div id='buttons'>
				<input type='radio' name='buttons' id='create-vertices' selected>
				<label for='create-vertices'>Create Vertices</label><br>
				<input type='radio' name='buttons' id='delete-vertices'>
				<label for='delete-vertices'>Delete Vertices</label><br>
				<input type='radio' name='buttons' id='create-edges'>
				<label for='create-edges'>Create Edges</label><br>
				<input type='radio' name='buttons' id='move-vertices'>
				<label for='move-vertices'>Move Vertices</label>
			</div>
	</body>
</html>
